name: LeGalet
options:
  bundleIdPrefix: com.jac
  developmentLanguage: fr
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    # Swift 5 language mode — matches the rest of Jac's native stack; avoids
    # strict-concurrency actor churn in a small, single-window display app.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: 9WZ66DZ69J
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  LeGalet:
    type: application
    platform: iOS
    sources:
      - path: LeGalet
    info:
      path: LeGalet/Resources/Info.plist
      properties:
        # User-facing name only — localized per device language in
        # {fr,en}.lproj/InfoPlist.strings (Carrousel / Carousel). The bundle id,
        # module, and product name stay LeGalet so installs keep their data.
        CFBundleDisplayName: Carrousel
        CFBundleName: LeGalet
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Only standard HTTPS encryption → exempt; declaring this skips the
        # export-compliance question on every TestFlight/App Store upload.
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: "© 2026 Jacques Gautreau"
        CFBundleDevelopmentRegion: fr
        CFBundleLocalizations: [fr, en]
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        # A calm hearth wants to stay lit — never auto-lock while drifting.
        # (Enforced at runtime too via isIdleTimerDisabled.)
        NSPhotoLibraryUsageDescription: "Pour afficher vos propres photos de famille sur l'écran calme. Vos photos restent dans votre photothèque — seul le lieu enregistré d'une photo peut être converti en nom de ville pour la légende."
        NSCalendarsFullAccessUsageDescription: "Pour faire dériver doucement vos rendez-vous du jour sur l'écran, comme de petits rappels."
        NSRemindersFullAccessUsageDescription: "Pour faire apparaître vos rappels au bon moment sur l'écran. Tout reste sur l'appareil."
        # iPad-only: a hearth for a shelf or counter, in any orientation.
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        PRODUCT_BUNDLE_IDENTIFIER: com.jac.LeGalet
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  LeGalet:
    build:
      targets:
        LeGalet: all
